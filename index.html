<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drachin Reels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: system-ui, -apple-system, sans-serif;
    }

    .container {
      width: 100%; height: 100vh; height: 100dvh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }
    .container::-webkit-scrollbar { display: none; }

    .page {
      width: 100%; height: 100vh; height: 100dvh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
    }

    iframe {
      width: 100%; height: 100%; border: none;
      position: absolute; top: 0; left: 0;
    }

    .label {
      position: absolute;
      bottom: 30px;
      left: 16px;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      text-shadow: 0 2px 8px #000;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="container" id="ctn"></div>

  <script>
    const XOR_KEY = '25041995';
    const EMBED_BASE = 'https://ok.ru/videoembed/';
    const RAW_URL = 'https://raw.githubusercontent.com/clickprog25/drachin-db/main/database.json';

    // Dekrip XOR
    function xorDecrypt(b64, key) {
      const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const keyBytes = new TextEncoder().encode(key);
      const dec = [];
      for (let i = 0; i < bytes.length; i++) dec.push(bytes[i] ^ keyBytes[i % keyBytes.length]);
      return new TextDecoder().decode(new Uint8Array(dec));
    }

    // Acak array
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    (async () => {
      const res = await fetch(RAW_URL);
      const json = await res.json();
      let data = json.data.map(item => ({
        nama: xorDecrypt(item.NAMAE, XOR_KEY),
        id: xorDecrypt(item.LINK, XOR_KEY)
      }));

      // Acak agar tidak urut
      data = shuffle(data);

      const ctn = document.getElementById('ctn');
      ctn.innerHTML = data.map((d, i) => `
        <div class="page" id="p${i}">
          <div class="label">${escapeHtml(d.nama)}</div>
        </div>
      `).join('');

      let activeIdx = -1;
      const frames = {};

      function play(i) {
        if (activeIdx === i) return;
        // Hapus iframe sebelumnya
        if (activeIdx >= 0 && frames[activeIdx]) {
          frames[activeIdx].remove();
          delete frames[activeIdx];
        }
        // Buat iframe baru
        const ifrm = document.createElement('iframe');
        ifrm.src = EMBED_BASE + data[i].id + '?autoplay=1';
        ifrm.allow = 'autoplay; fullscreen';
        ifrm.allowFullscreen = true;
        document.getElementById('p' + i).appendChild(ifrm);
        frames[i] = ifrm;
        activeIdx = i;
      }

      // Observer: deteksi slide yang terlihat
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const idx = parseInt(entry.target.id.slice(1));
            play(idx);
          }
        });
      }, { threshold: 0.7 });

      document.querySelectorAll('.page').forEach(p => observer.observe(p));

      // Mulai yang pertama
      play(0);
    })();

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
